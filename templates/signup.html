<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Sign Up</title>
  <link rel="stylesheet" href="/static/login.css">
</head>

<body>

  <div class="login-wrapper">
    <div class="login-card">

      <div class="form-side">
        <h2>Create Account</h2>

        <label>Full Name</label>
        <input type="text" id="name" placeholder="John Doe" required>

        <label>Email</label>
        <input type="email" id="email" placeholder="xyz@gmail.com" required>

        <label>Password</label>
        <input type="password" id="password" placeholder="********" required>

        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="********" required>

        <button onclick="createAccount()">Create Account</button>

        <button onclick="goToLogin()" style="background:#e5e7eb;color:#111;margin-top:14px;">
          Back to Login
        </button>

      </div>

      <div class="image-side">
        <img src="/static/assets/login image.png" alt="Signup illustration">
      </div>

    </div>
  </div>

  <script>
    function goToLogin() {
      window.location.href = "/login";
    }

    async function createAccount() {

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      /* ✅ EMAIL VALIDATION */
      if (!email.endsWith("@gmail.com")) {
        alert("Email must contain @gmail.com");
        return;
      }

      /* ✅ PASSWORD LENGTH */
      if (password.length < 8) {
        alert("Password must be at least 8 characters long");
        return;
      }

      /* ✅ PASSWORD MATCH */
      if (password !== confirmPassword) {
        alert("Passwords do not match!");
        return;
      }

      try {
        const res = await fetch("http://localhost:8000/signup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, email, password })
        });

        const data = await res.json();

        if (data.status === "account created") {
          window.location.href = "/connect";
        } else {
          alert("Signup failed!");
        }

      } catch (err) {
        alert("Server not responding!");
      }
    }
  </script>

</body>

</html>

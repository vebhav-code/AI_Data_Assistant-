<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>AI Data Assistant</title>
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>

  <!-- USER MENU -->
  <div class="user-menu">
    <div class="avatar" id="avatarLetter" onclick="toggleMenu()">A</div>
    <div class="menu-popup" id="menuPopup">
      <div onclick="openProfile()">👤 Profile</div>
      <div onclick="logout()">🚪 Logout</div>
    </div>
  </div>

  <div class="app">

    <!-- LEFT CHAT -->
    <div class="chat-panel">

      <div id="chatPanel"></div>

      <div class="chat-input-inside exact-input">
  <input id="userInput" placeholder="Type your question..." autocomplete="off">
  <button onclick="sendMessage()" class="send-btn-outline">➜</button>
</div>

    </div>

    <!-- RIGHT RESULT -->
    <div class="result-panel">

      <h3>AI Assistant</h3>

      <div id="resultContent">
        Ask something to see results...
      </div>

      <div class="action-buttons">
        <button onclick="saveReport()">📄 Generate Report</button>
        <button onclick="exploreTables()">📊 Explore Tables</button>
        <button onclick="generateER()">🗂 Generate ER Diagram</button>
      </div>

    </div>

  </div>

  <script src="/static/script.js"></script>

  <script>
    const userName = "Admin";
    document.getElementById("avatarLetter").innerText = userName[0];

    function toggleMenu() {
      const m = document.getElementById("menuPopup");
      m.style.display = m.style.display === "block" ? "none" : "block";
    }
    function openProfile() { alert("Profile coming soon"); }
    function logout() { window.location.href = "/login"; }
    function exploreTables() { alert("Coming soon"); }
    function generateER() { alert("Coming soon"); }
  </script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="/static/login.css">
</head>

<body>

  <div class="login-wrapper">
    <div class="login-card">

      <div class="form-side">
        <h2>Sign In</h2>

        <label>Email</label>
        <input type="email" id="email" placeholder="xyz@gmail.com" required>

        <label>Password</label>
        <input type="password" id="password" placeholder="********" required>

        <button onclick="goToApp()">Login</button>

        <p style="margin-top:18px;font-size:14px;color:#444;">
          Don’t have an account?
          <a href="/signup" style="color:#2563eb;text-decoration:none;font-weight:600;">
            Sign Up
          </a>
        </p>
      </div>

      <div class="image-side">
        <img src="/static/assets/login image.png" alt="Login illustration">
      </div>

    </div>
  </div>

  <script>
    async function goToApp() {

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      /* ✅ EMAIL VALIDATION */
      if (!email.endsWith("@gmail.com")) {
        alert("Email must contain @gmail.com");
        return;
      }

      /* ✅ PASSWORD VALIDATION */
      if (password.length < 8) {
        alert("Password must be at least 8 characters long");
        return;
      }

      try {
        const res = await fetch("http://localhost:8000/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (data.status === "success") {
          window.location.href = "/connect";
        } else {
          alert("Invalid login details!");
        }

      } catch (err) {
        alert("Server not responding!");
      }
    }
  </script>

</body>

</html>
